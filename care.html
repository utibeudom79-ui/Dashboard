<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories | FoodieAdmin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="care.css">
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="logo">
      <i class="fa-solid fa-utensils"></i>
      <span>FoodieAdmin</span>
    </div>
    <nav>
      <a href="dash.html"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
      <a href="minu.html"><i class="fa-solid fa-bowl-food"></i><span>Menu / Foods</span></a>
      <a href="oda.html"><i class="fa-solid fa-clipboard-list"></i><span>Orders</span></a>
      <a href="care.html" class="active"><i class="fa-solid fa-layer-group"></i><span>Categories</span></a>
      <a href="cus.html"><i class="fa-solid fa-users"></i><span>Customers</span></a>
      <a href="ana.html"><i class="fa-solid fa-chart-line"></i><span>Analytics</span></a>
    </nav>
    <a class="logout" id="logoutBtn">
      <i class="fa-solid fa-right-from-bracket"></i><span>Logout</span>
    </a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- NAVBAR -->
    <div class="navbar">
      <i class="fa-solid fa-bars" id="menuToggle"></i>
      <h2>Categories</h2>
      <div class="nav-right">
        <i class="fa-solid fa-moon" id="themeToggle"></i>
        <div class="notif">
          <i class="fa-solid fa-bell"></i>
          <span class="badge">0</span>
        </div>
        <div class="admin">
          <i class="fa-solid fa-user-circle"></i>
          <span id="adminEmail">Admin</span>
        </div>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- TOP BAR -->
      <div class="page-topbar">
        <div class="search-wrap">
          <i class="fa-solid fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search categories...">
        </div>
        <button class="add-btn" id="openAddModal">
          <i class="fa-solid fa-plus"></i> Add Category
        </button>
      </div>

      <!-- MINI STATS -->
      <div class="mini-stats">
        <div class="mini-stat">
          <span class="mini-label">Total Categories</span>
          <span class="mini-value" id="totalCats">0</span>
        </div>
        <div class="mini-stat">
          <span class="mini-label">Total Foods</span>
          <span class="mini-value" id="totalFoods">0</span>
        </div>
        <div class="mini-stat">
          <span class="mini-label">Active</span>
          <span class="mini-value green" id="activeCats">0</span>
        </div>
        <div class="mini-stat">
          <span class="mini-label">Inactive</span>
          <span class="mini-value red" id="inactiveCats">0</span>
        </div>
      </div>

      <!-- CATEGORIES GRID -->
      <div class="categories-grid" id="categoriesGrid">
        <div class="loading-state">
          <i class="fa-solid fa-spinner fa-spin"></i>
          <p>Loading categories...</p>
        </div>
      </div>

    </div>
  </div>

  <!-- ADD/EDIT MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Category</h3>
        <i class="fa-solid fa-xmark" id="closeModal"></i>
      </div>
      <div class="modal-body">
        <input type="hidden" id="catId">

        <div class="form-row">
          <div class="form-group">
            <label>Category Name *</label>
            <input type="text" id="catName" placeholder="e.g. Rice Dishes">
          </div>
          <div class="form-group">
            <label>Emoji / Icon</label>
            <input type="text" id="catEmoji" placeholder="e.g. 🍚">
          </div>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="catDesc" placeholder="Describe this category..." rows="3"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Color (for card)</label>
            <input type="color" id="catColor" value="#E63946">
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="catStatus">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
        </div>

        <div id="formError" class="form-error" style="display:none"></div>

        <div class="modal-actions">
          <button class="cancel-btn" id="cancelModal">Cancel</button>
          <button class="save-btn" id="saveCat">
            <span id="saveBtnText">Save Category</span>
            <i class="fa-solid fa-spinner fa-spin" id="saveSpinner" style="display:none"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- DELETE MODAL -->
  <div class="modal-overlay" id="deleteOverlay">
    <div class="modal small-modal">
      <div class="modal-header">
        <h3>Delete Category</h3>
        <i class="fa-solid fa-xmark" id="closeDelete"></i>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-soft);margin-bottom:20px;">Are you sure you want to delete <strong id="deleteCatName"></strong>? This cannot be undone.</p>
        <div class="modal-actions">
          <button class="cancel-btn" id="cancelDelete">Cancel</button>
          <button class="delete-btn" id="confirmDelete">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBZYkic-Ny5ekKpCOjXyfkzWl5gg7qCXFg",
      authDomain: "adminboard-3e112.firebaseapp.com",
      projectId: "adminboard-3e112",
      storageBucket: "adminboard-3e112.firebasestorage.app",
      messagingSenderId: "578529087086",
      appId: "1:578529087086:web:d8329a705e506257e4607f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allCats = [];
    let allFoods = [];
    let deleteTargetId = null;

    onAuthStateChanged(auth, user => {
      if (!user) {
        window.location.href = 'log.html';
      } else {
        document.getElementById('adminEmail').textContent = user.email.split('@')[0];
        loadData();
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'log.html';
    });

    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });

    document.getElementById('themeToggle').addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const icon = document.getElementById('themeToggle');
      icon.classList.toggle('fa-moon');
      icon.classList.toggle('fa-sun');
    });

    async function loadData() {
      const [catSnap, foodSnap] = await Promise.all([
        getDocs(collection(db, 'categories')),
        getDocs(collection(db, 'foods'))
      ]);
      allCats = catSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      allFoods = foodSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateStats();
      renderCategories(allCats);
    }

    function updateStats() {
      document.getElementById('totalCats').textContent = allCats.length;
      document.getElementById('totalFoods').textContent = allFoods.length;
      document.getElementById('activeCats').textContent = allCats.filter(c => c.status === 'active').length;
      document.getElementById('inactiveCats').textContent = allCats.filter(c => c.status === 'inactive').length;
    }

    function renderCategories(cats) {
      const grid = document.getElementById('categoriesGrid');
      if (cats.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-layer-group"></i>
            <p>No categories found</p>
            <small>Click "Add Category" to get started</small>
          </div>`;
        return;
      }

      grid.innerHTML = cats.map(c => {
        const foodCount = allFoods.filter(f => f.category === c.name).length;
        const color = c.color || '#E63946';
        return `
          <div class="cat-card">
            <div class="cat-card-top" style="background: ${color}20; border-left: 4px solid ${color}">
              <div class="cat-emoji">${c.emoji || '📁'}</div>
              <div class="cat-info">
                <h4>${c.name}</h4>
                <p>${c.description || 'No description'}</p>
              </div>
              <span class="cat-status ${c.status || 'active'}">${c.status || 'active'}</span>
            </div>
            <div class="cat-card-bottom">
              <div class="cat-meta">
                <span><i class="fa-solid fa-bowl-food"></i> ${foodCount} Foods</span>
                <span style="color:${color};font-weight:600">${c.name}</span>
              </div>
              <div class="cat-actions">
                <button class="icon-btn edit" onclick="editCat('${c.id}')"><i class="fa-solid fa-pen"></i></button>
                <button class="icon-btn del" onclick="deleteCat('${c.id}', '${c.name}')"><i class="fa-solid fa-trash"></i></button>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', () => {
      const search = document.getElementById('searchInput').value.toLowerCase();
      renderCategories(allCats.filter(c => c.name?.toLowerCase().includes(search)));
    });

    // Modal
    document.getElementById('openAddModal').addEventListener('click', () => {
      document.getElementById('modalTitle').textContent = 'Add Category';
      document.getElementById('saveBtnText').textContent = 'Save Category';
      clearForm();
      document.getElementById('modalOverlay').classList.add('show');
    });

    document.getElementById('closeModal').addEventListener('click', closeModal);
    document.getElementById('cancelModal').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('show');
      clearForm();
    }

    function clearForm() {
      document.getElementById('catId').value = '';
      document.getElementById('catName').value = '';
      document.getElementById('catEmoji').value = '';
      document.getElementById('catDesc').value = '';
      document.getElementById('catColor').value = '#E63946';
      document.getElementById('catStatus').value = 'active';
      document.getElementById('formError').style.display = 'none';
    }

    // Save
    document.getElementById('saveCat').addEventListener('click', async () => {
      const id = document.getElementById('catId').value;
      const name = document.getElementById('catName').value.trim();
      const emoji = document.getElementById('catEmoji').value.trim();
      const description = document.getElementById('catDesc').value.trim();
      const color = document.getElementById('catColor').value;
      const status = document.getElementById('catStatus').value;
      const errorEl = document.getElementById('formError');

      if (!name) {
        errorEl.textContent = 'Category name is required.';
        errorEl.style.display = 'block';
        return;
      }

      document.getElementById('saveBtnText').textContent = 'Saving...';
      document.getElementById('saveSpinner').style.display = 'inline-block';
      document.getElementById('saveCat').disabled = true;

      try {
        const data = { name, emoji, description, color, status, updatedAt: serverTimestamp() };
        if (id) {
          await updateDoc(doc(db, 'categories', id), data);
        } else {
          data.createdAt = serverTimestamp();
          await addDoc(collection(db, 'categories'), data);
        }
        closeModal();
        await loadData();
      } catch (err) {
        errorEl.textContent = 'Error: ' + err.message;
        errorEl.style.display = 'block';
      } finally {
        document.getElementById('saveBtnText').textContent = 'Save Category';
        document.getElementById('saveSpinner').style.display = 'none';
        document.getElementById('saveCat').disabled = false;
      }
    });

    // Edit
    window.editCat = function(id) {
      const c = allCats.find(c => c.id === id);
      if (!c) return;
      document.getElementById('modalTitle').textContent = 'Edit Category';
      document.getElementById('saveBtnText').textContent = 'Update Category';
      document.getElementById('catId').value = c.id;
      document.getElementById('catName').value = c.name || '';
      document.getElementById('catEmoji').value = c.emoji || '';
      document.getElementById('catDesc').value = c.description || '';
      document.getElementById('catColor').value = c.color || '#E63946';
      document.getElementById('catStatus').value = c.status || 'active';
      document.getElementById('modalOverlay').classList.add('show');
    };

    // Delete
    window.deleteCat = function(id, name) {
      deleteTargetId = id;
      document.getElementById('deleteCatName').textContent = name;
      document.getElementById('deleteOverlay').classList.add('show');
    };

    document.getElementById('closeDelete').addEventListener('click', () => document.getElementById('deleteOverlay').classList.remove('show'));
    document.getElementById('cancelDelete').addEventListener('click', () => document.getElementById('deleteOverlay').classList.remove('show'));

    document.getElementById('confirmDelete').addEventListener('click', async () => {
      if (!deleteTargetId) return;
      try {
        await deleteDoc(doc(db, 'categories', deleteTargetId));
        document.getElementById('deleteOverlay').classList.remove('show');
        await loadData();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    });
  </script>

</body>
</html>
